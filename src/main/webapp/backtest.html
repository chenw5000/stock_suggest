<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StockSugg — backtest</title>
  <link rel="stylesheet" href="css/suggest.css">
</head>
<body>
  <main>
    <header class="page-header">
      <div>
        <h1>Suggestion backtest</h1>
        <p class="meta" id="meta">Configure one strategy and simulate trades from stored Gemini labels.</p>
      </div>
    </header>

    <p class="error" id="error" hidden></p>

    <section class="backtest-panel">
      <form id="backtest-form" class="backtest-form">
        <div class="backtest-row">
          <div class="backtest-field">
            <label for="ticker">Ticker</label>
            <select id="ticker" name="ticker" required></select>
          </div>
          <div class="backtest-field">
            <label for="cash">Starting cash</label>
            <input id="cash" name="cash" type="number" min="1" step="100" value="10000" required>
          </div>
          <div class="backtest-field">
            <label for="from">From</label>
            <input id="from" name="from" type="date" required>
          </div>
          <div class="backtest-field">
            <label for="to">To</label>
            <input id="to" name="to" type="date" required>
          </div>
        </div>

        <div class="backtest-row">
          <div class="backtest-field">
            <label for="parts">Parts (buckets)</label>
            <input id="parts" name="parts" type="number" min="1" max="20" step="1" value="4" required>
          </div>
          <div class="backtest-field">
            <label for="buy-conf">Buy confidence ≥</label>
            <input id="buy-conf" name="buyConf" type="number" min="0" max="1" step="0.05" value="0.00" required>
          </div>
          <div class="backtest-field">
            <label for="sell-conf">Sell confidence ≥</label>
            <input id="sell-conf" name="sellConf" type="number" min="0" max="1" step="0.05" value="0.00" required>
          </div>
        </div>

        <div class="backtest-row backtest-row-actions">
          <label class="backtest-check">
            <input id="sell-on-sell" type="checkbox" checked>
            Sell on SELL signal
          </label>
          <label class="backtest-check">
            <input id="sell-on-avoid" type="checkbox" checked>
            Sell on AVOID signal (one part)
          </label>
          <label class="backtest-check">
            <input id="sell-all-on-avoid" type="checkbox">
            Sell ALL when signal is AVOID
          </label>
          <div class="backtest-actions">
            <button type="submit" id="run-btn">Run backtest</button>
          </div>
        </div>
      </form>
    </section>

    <section id="results" class="backtest-results" hidden>
      <h2 class="section-title">Summary</h2>
      <p class="meta" id="strategy-line"></p>
      <div class="backtest-summary" id="summary"></div>

      <h2 class="section-title">Trades</h2>
      <div class="table-wrap">
        <p class="empty" id="trades-empty" hidden>No fills (only skips or no signals).</p>
        <table id="trades-table" hidden>
          <thead>
            <tr>
              <th>date</th>
              <th>event</th>
              <th>shares</th>
              <th>price</th>
              <th>cash</th>
              <th>position</th>
              <th>equity</th>
              <th>action</th>
              <th>conf</th>
            </tr>
          </thead>
          <tbody id="trades-body"></tbody>
        </table>
      </div>
    </section>

    <p class="meta">
      <a href="index.html">← Home</a>
      · <a href="suggest.html">Suggestions</a>
      · <a href="history.html">History</a>
      · <a href="admin.html">Admin</a>
    </p>
  </main>
  <script src="js/backtest.js"></script>
</body>
</html>
